###############################################
# MediaMTX — Drone Station RTSP/WebRTC/RTMP Server
# Updated: Added WebRTC (low-latency browser) + RTMP input
###############################################

logLevel: info
logDestinations: [stdout]

# Authentication — allow all access
authMethod: internal
authInternalUsers:
- user: any
  pass:
  ips: []
  permissions:
  - action: publish
    path:
  - action: read
    path:
  - action: playback
    path:
  - action: api
  - action: metrics
  - action: pprof

# Control API
api: yes
apiAddress: :9997
apiAllowOrigin: '*'

# ── RTSP (Drone video ingest from vessels) ────────────────────────
rtsp: yes
rtspAddress: :8554

# ── RTMP (OBS / FFmpeg input → WebRTC output) ────────────────────
# Enable this if your colleagues/operators push via OBS or FFmpeg
rtmp: yes
rtmpAddress: :1935

# ── HLS (Browser fallback — higher latency 3-6s) ─────────────────
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsAllowOrigin: '*'

# ── SRT (disabled) ────────────────────────────────────────────────
srt: no

# ── WebRTC (Low-latency browser playback — ~0.5s) ─────────────────
# Access: http://SERVER_IP:8889/STREAM_PATH
# RTMP → WebRTC: push to rtmp://SERVER_IP/live/mystream
#                view at http://SERVER_IP:8889/live/mystream
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no              # HTTP mode (change to yes for HTTPS/prod)
# ⚠️  Set this to your EC2 PUBLIC IP or private IP:
webrtcICEUDPMuxAddress: :8890    # Use EC2 public IP in production, e.g. 15.164.50.229:8890

# ── Path defaults ─────────────────────────────────────────────────
pathDefaults:
  source: publisher

  # Auto-Recording for all drone streams
  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordSegmentDuration: 1h
  recordDeleteAfter: 7d

paths:
  all_others:
