# Mosquitto MQTT Broker Configuration
# ────────────────────────────────────

# TCP listener (Drone/Dock connections)
listener 1883
protocol mqtt

# WebSocket listener (Browser dashboards)
listener 9001
protocol websockets

# Allow anonymous for development (disable in production)
allow_anonymous true

# Persistence (queue messages for offline drones/docks)
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
